name: Status Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: status-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  template:
    name: template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate scripts
        run: |
          node --check scripts/deck.mjs
          node --check scripts/release.mjs
          node --check scripts/validate-agent-assets.mjs

      - name: Validate agent assets
        run: npm run check:agent

      - name: Build template decks
        run: npm run build:all
